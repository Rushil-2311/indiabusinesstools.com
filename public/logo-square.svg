<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1A56DB"/>
      <stop offset="100%" stop-color="#0A2466"/>
    </linearGradient>
    <!-- Subtle radial glow -->
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%"   stop-color="#2D6FFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0A2466" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="60" fill="url(#bgGrad)"/>
  <rect width="400" height="400" rx="60" fill="url(#glow)"/>

  <!-- Saffron accent bar at top (Indian flag stripe) -->
  <path d="M0 0 L400 0 L400 20 Q200 30 0 20 Z" fill="#FF8000" opacity="0.75"/>
  <rect x="0" y="0" width="400" height="12" rx="0" fill="#FF8000" opacity="0.5"/>
  <rect x="0" y="0" width="400" height="12" rx="60" fill="#FF8000" opacity="0.5"/>

  <!-- Green accent bar at bottom -->
  <rect x="0" y="388" width="400" height="12" rx="0" fill="#138808" opacity="0.5"/>
  <rect x="0" y="388" width="400" height="12" rx="60" fill="#138808" opacity="0.5"/>

  <!-- Ascending bars (white) — centered in upper portion -->
  <rect x="108" y="220" width="50" height="80"  rx="12" fill="white" opacity="0.90"/>
  <rect x="175" y="160" width="50" height="140" rx="12" fill="white" opacity="0.90"/>
  <rect x="242" y="100" width="50" height="200" rx="12" fill="white" opacity="0.90"/>

  <!-- Saffron trend line -->
  <polyline points="133,218  200,158  267,98"
            stroke="#FF8000" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"
            fill="none"/>

  <!-- Green peak dot -->
  <circle cx="267" cy="98" r="18" fill="#138808"/>
  <circle cx="267" cy="98" r="9"  fill="white"/>

  <!-- Wordmark: "India Business Tools" -->
  <text x="200" y="348"
        font-family="'Outfit','Inter',system-ui,-apple-system,sans-serif"
        font-size="32" font-weight="800" letter-spacing="-0.5"
        fill="white" text-anchor="middle">India Business Tools</text>

  <!-- Thin saffron underline under wordmark -->
  <rect x="120" y="356" width="160" height="3" rx="1.5" fill="#FF8000" opacity="0.8"/>
</svg>
